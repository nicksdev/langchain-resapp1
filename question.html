<!DOCTYPE html>
<html>
<head>
  <title>LangChain Chat</title>
</head>
<body>
  <h2>Chat with API</h2>

  <input id="msg" placeholder="Ask something..." />
  <button onclick="send()">Send</button>

  <pre id="output"></pre>

  <script>
    async function send() {
      const message = document.getElementById("msg").value;

     const res = await fetch(`http://3.107.196.197:8080/ask?q=${encodeURIComponent(message)}`, {
//      const res = await fetch(`http://127.0.0.1:8000/ask?q=${encodeURIComponent(message)}`, {
        method: "GET"
      });

      const data = await res.json();
      document.getElementById("output").innerText =
        JSON.stringify(data, null, 2);
    }
  </script>
</body>
</html>
